{% extends "base_main.html" %}

{% block title %}Profil{% endblock %}

{% block content %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Poppins', Arial;
    background: #eef0f2;
  }

  .container {
    width: 900px;
    margin: 60px auto;
    background: #f5f5f5;
    padding: 40px 50px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
  }

  /* TITLE */
  h1 {
    margin-bottom: 10px;
  }

  .subtitle {
    color: #666;
    margin-bottom: 30px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px 30px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
  }

  .full {
    grid-column: span 2;
  }

  input[readonly] {
    background: #ddd;
    cursor: not-allowed;
  }

  /* INPUT */
  label {
    margin-bottom: 6px;
    font-weight: bold;
  }

  .label-with-tooltip {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .info-icon {
    width: 18px;
    height: 18px;
    background: #e5e5e5;
    color: #333;
    border-radius: 50%;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .tooltip {
    position: absolute;
    top: 36px;
    left: 0;

    width: 380px;
    max-width: 420px;

    padding: 16px 18px;

    background: #020617;
    color: #fff;

    border-radius: 14px;
    font-size: 13px;
    line-height: 1.6;

    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);

    opacity: 0;
    visibility: hidden;
    transform: translateY(6px);
    transition: 0.25s ease;
    z-index: 99;

    text-align: justify;
  }

  .tooltip::before {
    content: "";
    position: absolute;
    top: -6px;
    left: 20px;

    width: 12px;
    height: 12px;
    background: #020617;
    transform: rotate(45deg);
  }

  .label-with-tooltip:hover .tooltip {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .tooltip b {
    display: block;
    margin-bottom: 4px;
  }

  input,
  select {
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: #e5e5e5;
    font-size: 14px;
    outline: none;
    font-family: 'Poppins', sans-serif;
  }

  select {
    padding: 12px 14px;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);

    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background-image: url("data:image/svg+xml;utf8,<svg fill='%23666' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 12px center;
    background-size: 16px;
  }

  select:focus,
  input:focus {
    box-shadow: 0 0 0 2px rgba(180, 180, 180, 0.4);
  }

  input::placeholder {
    color: #888;
  }

  .button-group {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    gap: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    border: none;
  }

  .btn-cancel {
    background: #e5e5e5;
  }

  .btn-save {
    background: #020617;
    color: white;
  }

  .btn-save:hover {
    background: #111827;
  }

  #error_password {
    font-size: 13px;
    margin-top: 5px;
  }
</style>

<div class="container">

  <h1>Edit Profil</h1>
  <div class="subtitle">Perbarui informasi pribadi Anda</div>

  {% if message %}
  <script>
    alert("{{ message }}");
  </script>
  {% endif %}

  <form method="POST">
    <div class="form-grid">

      <!-- Usia -->
      <div class="form-group">
        <label>Usia</label>
        <input type="number" name="usia" value="{{ user.usia }}">
      </div>

      <!-- Jenis Kelamin (READ ONLY) -->
      <div class="form-group">
        <label>Jenis Kelamin</label>
        <input type="text" value="{{ user.jenis_kelamin }}" readonly>
      </div>

      <!-- Berat -->
      <div class="form-group">
        <label>Berat Badan (kg)</label>
        <input type="number" name="berat" value="{{ user.berat_badan }}">
      </div>

      <!-- Tinggi -->
      <div class="form-group">
        <label>Tinggi Badan (cm)</label>
        <input type="number" name="tinggi" value="{{ user.tinggi_badan }}">
      </div>

      <!-- Aktivitas -->
      <div class="form-group">
        <label class="label-with-tooltip">
          Aktivitas Harian
          <span class="info-icon">?</span>

          <div class="tooltip">
            <b>Sedentary / Light Activity</b>
            Aktivitas ringan, jarang olahraga, lebih banyak duduk atau berdiri (contoh: kerja kantor)
            <br><br>

            <b>Active / Moderately Active</b>
            Aktivitas sedang, kadang olahraga rutin atau pekerjaan cukup aktif (contoh: jogging, bersepeda)
            <br><br>

            <b>Vigorous / Vigorously Active</b>
            Aktivitas berat setiap hari, pekerjaan fisik atau olahraga intens (contoh: buruh, atlet, kerja lapangan)
          </div>
        </label>
        <select name="aktivitas">
          <option value="sedentary" {% if user.aktivitas_harian=="sedentary" %}selected{% endif %}>Sedentary or Light
            Activity</option>
          <option value="active" {% if user.aktivitas_harian=="active" %}selected{% endif %}>Active or Moderately Active
          </option>
          <option value="vigorous" {% if user.aktivitas_harian=="vigorous" %}selected{% endif %}>Vigorous or Vigorously
            Active</option>
        </select>
      </div>

      <!-- Alergi -->
      <div class="form-group">
        <label>Alergi</label>
        <input type="text" name="alergi" value="{{ user.alergi }}">
      </div>

      <!-- Password Lama -->
      <div class="form-group">
        <label>Password Sekarang</label>
        <input type="password" name="old_password" placeholder="Kosongkan jika tidak ingin mengubah password">
      </div>

      <!-- Password Baru -->
      <div class="form-group">
        <label>Password Baru (Opsional)</label>
        <input type="password" id="new_password" name="new_password"
          placeholder="Kosongkan jika tidak ingin mengubah password">
      </div>

      <!-- Konfirmasi Password -->
      <div class="form-group full">
        <label>Konfirmasi Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
          placeholder="Kosongkan jika tidak ingin mengubah password" onkeyup="cekPassword()">
        <p id="error_password" style="color:red;"></p>
      </div>

    </div>

    <div class="button-group">
      <a href="/home" class="btn btn-cancel" style="text-align:center; text-decoration:none;">Batal</a>
      <button type="submit" class="btn btn-save">Simpan Perubahan</button>
    </div>

  </form>

</div>

<script>
  function cekPassword() {
    var pass1 = document.getElementById("new_password").value;
    var pass2 = document.getElementById("confirm_password").value;
    var error = document.getElementById("error_password");

    if (pass2.length === 0) {
      error.innerHTML = "";
      return;
    }

    if (pass1 !== pass2) {
      error.innerHTML = "Password tidak sama";
    } else {
      error.innerHTML = "";
    }
  }
</script>

{% endblock %}
